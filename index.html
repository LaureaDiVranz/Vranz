<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: black;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      color: white;
      font-family: sans-serif;
      cursor: pointer;
    }

    #playButton {
      font-size: 60px;
      margin-bottom: 10px;
    }

    #text {
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="overlay">
  <div id="playButton">▶</div>
  <div id="text">Premi per avviare</div>
</div>

<video id="video" loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");

  overlay.addEventListener("click", async () => {
    overlay.style.display = "none";

    try {
      video.muted = false;
      await video.play();
    } catch (e) {
      console.log("Errore play:", e);
    }
  });
</script>

</body>
</html>
